name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macOS-latest
        rustflags:
          - ""
          - "--features=comment"

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Install cargo-nextest
      uses: taiki-e/install-action@nextest
    - name: Build
      run: cargo build --verbose
    - name: Run tests "${{matrix.rustflags}}"
      run: cargo nextest run ${{matrix.rustflags}}
